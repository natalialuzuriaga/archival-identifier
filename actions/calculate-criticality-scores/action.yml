name: Go CI
description: 'Calculate criticality scores for all repos in a GitHub organization'

inputs:
  ORG_NAME:
    description: 'GitHub organization name to fetch list of repos for'
    required: true
  GITHUB_TOKEN:
    description: 'GitHub token for org access'
    required: true

outputs:
  data_file:
    description: 'Path to the criticality score results JSON file'
    value: criticality-score-results.json

runs:
  using: 'composite'
  steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'
        cache: true

    - name: Run and save criticality score for all repos
      id: criticality
      shell: bash
      run: |
        # Install criticality_score tool
        go install github.com/ossf/criticality_score/v2/cmd/criticality_score@latest

        # Saves into repos array
        mapfile -t repos < <(
          gh api orgs/${{ inputs.ORG_NAME }}/repos --paginate --jq '.[].name'
        )

        # Calculates criticality score for each repo and saves into results variable as JSON
        results='{}'
        
        for repo_name in "${repos[@]}"; do
          repo_url="https://github.com/${{ inputs.ORG_NAME }}/${repo_name}"
          score_obj=$(criticality_score -depsdev-disable -format=json "$repo_url")
          score=$(echo "$score_obj" | jq '.default_score | tonumber')
          repo_entry=$(jq -n --arg key "$repo_name" --argjson value "$score" '{($key): $value}')
          results=$(echo "$results $repo_entry" | jq -s 'add')
        done
        echo "$results"

        # Output and saves results into criticality-score-results.json
        echo "$results" > criticality-score-results.json
        echo "Criticality scores: $results"
      env:
        GITHUB_AUTH_TOKEN: ${{ inputs.GITHUB_TOKEN }}
        GH_TOKEN: ${{ inputs.GITHUB_TOKEN }}