name: archival-identifier
description: A GitHub Action to identify repositories that are candidates for archival based on inactivity, reuse via forks, criticality score, and repository contents.

inputs:
  ORG_NAME:
    description: 'GitHub organization to analyze'
    required: true
  
  THRESHOLD_TIME:
    description: 'Number of days of inactivity to consider for archival'
    required: false
    default: '180'
  
  GITHUB_ORG_TOKEN:
    description: 'GitHub token for org access'
    required: true
    default: ${{ github.token }}

  START_DATE:
    description: 'Start date for historical data (YYYY-MM-DD) - required, e.g., 2026-01-01'
    required: true

  END_DATE:
    description: 'End date for historical data (YYYY-MM-DD) - defaults to today'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
      
    - name: Fetch historical changelog data
      uses: DSACMS/archival-identifier/actions/fetch-changelog@main
      with:
        start_date: ${{ inputs.START_DATE }}
        end_date: ${{ inputs.END_DATE }}
        org_name: ${{ inputs.ORG_NAME }}
        github_token: ${{ inputs.GITHUB_ORG_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      shell: bash
      run: |
        pip install -r ${{ github.action_path }}/requirements.txt
    
    - name: Run inactivity script
      id: identify-archival-candidates
      shell: bash
      env:
        ORG_NAME: ${{ inputs.ORG_NAME }}
        THRESHOLD_TIME: ${{ inputs.THRESHOLD_TIME }}
        GITHUB_AUTH_TOKEN: ${{ inputs.GITHUB_ORG_TOKEN }}
        START_DATE: ${{ inputs.START_DATE }}
        END_DATE: ${{ inputs.END_DATE }}
      run: |
        python ${{ github.action_path }}/scripts/main.py data.json

    - name: Create issue with archival-identifier results on the repository
      uses: JasonEtco/create-an-issue@v2
      env:
        GITHUB_TOKEN: ${{ inputs.GITHUB_ORG_TOKEN }}
      with:
        filename: ./archival_candidates_report.md

    - name: Clean up temp files
      shell: bash
      if: always()
      run: |
        rm -f data.json
        rm -rf _super_changelog_src/ 
